<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RappelRadar — Alertes rappels produits en France</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="#accueil" onclick="closeSidebarMobile()" class="sidebar-logo-link">
      <span class="sidebar-logo-icon">📡</span>
      <span class="sidebar-logo-text">Rappel<span>Radar</span></span>
    </a>
    <button class="sidebar-close" id="sidebarClose" aria-label="Fermer">✕</button>
  </div>
  <nav class="sidebar-nav">
    <a class="sidebar-item" href="#accueil" data-page="accueil">
      <span class="sidebar-item-icon">🏠</span>
      <span>Accueil</span>
    </a>
    <a class="sidebar-item" href="#alertes" data-page="alertes">
      <span class="sidebar-item-icon">⚠️</span>
      <span>Alertes rappels</span>
    </a>
    <a class="sidebar-item" href="#maliste" data-page="maliste">
      <span class="sidebar-item-icon">⭐</span>
      <span>Ma liste</span>
      <span class="sidebar-item-badge" id="listeBadge" style="display:none">0</span>
    </a>
    <div class="sidebar-divider"></div>
    <a class="sidebar-item" href="#apropos" data-page="apropos">
      <span class="sidebar-item-icon">ℹ️</span>
      <span>À propos</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <span class="sidebar-footer-text">Sources : RappelConso · DGCCRF 🇫🇷</span>
  </div>
</aside>

<!-- Main content -->
<main class="main" id="main">

  <!-- Topnav : sticky, visible desktop + mobile -->
  <nav class="topnav" id="topnav">
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
    <a href="#accueil" class="topnav-logo">
      <span class="topnav-logo-icon">📡</span>
      <span class="topnav-logo-text">Rappel<strong>Radar</strong></span>
    </a>
    <div class="topnav-search">
      <span class="topnav-search-icon">🔍</span>
      <input type="text" id="navSearchInput" placeholder="Produit, marque, numéro de lot…" autocomplete="off" aria-label="Rechercher des rappels de produits">
    </div>
    <div class="topnav-actions">
      <button class="btn-notif" id="btnNotif" aria-label="Activer les notifications de rappels">🔔 Activer les alertes</button>
    </div>
  </nav>

  <!-- Page content injected by JS -->
  <div class="page-content" id="pageContent"></div>

</main>

<script src="js/app.js"></script>
</body>
</html>
